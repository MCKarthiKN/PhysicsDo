<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics DPP · Current Density</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'LemonMilk';src:url('https://cdn.jsdelivr.net/gh/nicholasgasior/lemon-milk@main/lemon_milk.woff2') format('woff2');font-weight:400;font-display:swap;}
@font-face{font-family:'LemonMilk';src:url('https://cdn.jsdelivr.net/gh/nicholasgasior/lemon-milk@main/lemon_milk_bold.woff2') format('woff2');font-weight:700;font-display:swap;}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f7f6f3;
  --surface:#ffffff;
  --border:#e8e6e0;
  --border2:#d4d1c8;
  --text:#1a1916;
  --text2:#6b6760;
  --text3:#a09d97;
  --accent:#1a1916;
  --tag-bg:#f0ede8;
  --correct-bg:#f0faf5;
  --correct:#1a7a4a;
  --correct-border:#b3e0c6;
  --wrong-bg:#fff5f5;
  --wrong:#c0392b;
  --wrong-border:#f5c6c2;
  --yt:#ff2d2d;
  --highlight:#1a1916;
  --pill-active-bg:#1a1916;
  --pill-active-text:#f7f6f3;
}

html,body{width:100%;min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;}

/* ── LAYOUT ── */
#shell{max-width:760px;margin:0 auto;padding:0 24px 80px;}

/* ── TOP NAV ── */
#topnav{display:flex;align-items:center;justify-content:space-between;padding:28px 0 32px;}
.brand{font-family:'LemonMilk',sans-serif;font-size:11px;letter-spacing:0.18em;color:var(--text);text-transform:uppercase;}
.brand span{color:var(--text3);}
#back-btn{display:none;align-items:center;gap:6px;background:none;border:none;cursor:pointer;font-family:'LemonMilk',sans-serif;font-size:10px;letter-spacing:0.12em;color:var(--text2);text-transform:uppercase;padding:6px 0;transition:color 0.15s;}
#back-btn:hover{color:var(--text);}
#back-btn svg{transition:transform 0.15s;}
#back-btn:hover svg{transform:translateX(-2px);}

/* ── SCREEN MANAGER ── */
.screen{display:none;}
.screen.active{display:block;}

/* ── HOME SCREEN ── */
#home-heading{margin-bottom:8px;}
#home-heading h1{font-family:'LemonMilk',sans-serif;font-size:22px;font-weight:700;letter-spacing:0.04em;line-height:1.3;}
#home-sub{font-size:14px;color:var(--text2);margin-bottom:36px;}

.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:520px){.topic-grid{grid-template-columns:1fr;}}

.topic-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:20px 22px;
  cursor:pointer;
  transition:border-color 0.18s, box-shadow 0.18s, transform 0.18s;
  text-align:left;
  position:relative;
  overflow:hidden;
}
.topic-card:hover{
  border-color:var(--border2);
  box-shadow:0 4px 20px rgba(0,0,0,0.07);
  transform:translateY(-2px);
}
.topic-card:active{transform:translateY(0);}
.tc-num{font-family:'LemonMilk',sans-serif;font-size:10px;letter-spacing:0.15em;color:var(--text3);margin-bottom:8px;text-transform:uppercase;}
.tc-name{font-size:14px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:10px;}
.tc-bar{display:flex;align-items:center;gap:8px;}
.tc-dots{display:flex;gap:3px;}
.tc-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);}
.tc-dot.done{background:var(--correct);}
.tc-count{font-size:12px;color:var(--text3);}
.tc-arrow{position:absolute;right:18px;top:50%;transform:translateY(-50%);color:var(--text3);transition:transform 0.18s, color 0.18s;}
.topic-card:hover .tc-arrow{transform:translateY(-50%) translateX(3px);color:var(--text);}

/* ── QUESTION SCREEN ── */
#qscreen-header{margin-bottom:28px;}
.qs-topic{font-family:'LemonMilk',sans-serif;font-size:10px;letter-spacing:0.18em;color:var(--text3);text-transform:uppercase;margin-bottom:10px;}
.qs-title{font-size:20px;font-weight:600;letter-spacing:-0.01em;}

/* mini question selector */
.q-selector{display:flex;gap:6px;margin-bottom:28px;flex-wrap:wrap;}
.q-pill{
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--border);
  background:var(--surface);
  font-family:'LemonMilk',sans-serif;font-size:10px;letter-spacing:0.05em;
  color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
  flex-shrink:0;
}
.q-pill:hover{border-color:var(--border2);color:var(--text);}
.q-pill.active{background:var(--pill-active-bg);color:var(--pill-active-text);border-color:var(--pill-active-bg);}
.q-pill.answered-c{background:var(--correct-bg);border-color:var(--correct-border);color:var(--correct);}
.q-pill.answered-w{background:var(--wrong-bg);border-color:var(--wrong-border);color:var(--wrong);}

/* question card */
#q-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:28px 28px 24px;
  position:relative;
}
.q-label{font-family:'LemonMilk',sans-serif;font-size:9px;letter-spacing:0.2em;color:var(--text3);text-transform:uppercase;margin-bottom:14px;}
.q-text{font-size:15.5px;line-height:1.75;color:var(--text);margin-bottom:24px;font-weight:400;}

.options{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.opt{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;
  border:1px solid var(--border);
  border-radius:10px;
  background:var(--bg);
  cursor:pointer;font-size:14px;color:var(--text2);
  transition:all 0.15s;text-align:left;
}
.opt:hover:not(.locked){border-color:var(--border2);color:var(--text);background:var(--surface);}
.opt-letter{
  width:24px;height:24px;border-radius:6px;
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:'LemonMilk',sans-serif;font-size:9px;letter-spacing:0.05em;
  color:var(--text3);flex-shrink:0;transition:all 0.15s;background:var(--surface);
}
.opt:hover:not(.locked) .opt-letter{border-color:var(--text);color:var(--text);}

.opt.is-correct{background:var(--correct-bg);border-color:var(--correct-border);color:var(--correct);}
.opt.is-correct .opt-letter{background:var(--correct-bg);border-color:var(--correct-border);color:var(--correct);}
.opt.is-wrong{background:var(--wrong-bg);border-color:var(--wrong-border);color:var(--wrong);}
.opt.is-wrong .opt-letter{background:var(--wrong-bg);border-color:var(--wrong-border);color:var(--wrong);}
.opt.reveal-correct{opacity:0.5;}
.opt.locked{cursor:default;pointer-events:none;}

/* solution */
#sol-wrap{
  overflow:hidden;max-height:0;opacity:0;
  transition:max-height 0.4s ease, opacity 0.35s ease;
}
#sol-wrap.open{max-height:300px;opacity:1;}
#sol-box{
  border-left:2px solid var(--text3);
  padding:12px 16px;margin-bottom:18px;
  font-size:13.5px;line-height:1.75;color:var(--text2);
}
#sol-box strong{color:var(--text);font-weight:600;}

/* action row */
.act-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
#show-ans-btn{
  font-family:'LemonMilk',sans-serif;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;
  background:none;border:1px solid var(--border);border-radius:8px;
  padding:9px 16px;cursor:pointer;color:var(--text2);transition:all 0.15s;
}
#show-ans-btn:hover{border-color:var(--border2);color:var(--text);}
.nav-btns{display:flex;gap:8px;}
#prev-btn,#next-btn{
  font-family:'LemonMilk',sans-serif;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;
  border-radius:8px;padding:9px 18px;cursor:pointer;
  display:flex;align-items:center;gap:6px;transition:all 0.15s;border:1px solid var(--border);
}
#prev-btn{background:none;color:var(--text2);}
#prev-btn:hover{border-color:var(--border2);color:var(--text);}
#next-btn{background:var(--text);color:var(--bg);border-color:var(--text);}
#next-btn:hover{opacity:0.85;}
#next-btn:disabled,#prev-btn:disabled{opacity:0.3;cursor:default;pointer-events:none;}

/* feedback chip */
#feedback{
  font-family:'LemonMilk',sans-serif;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;
  padding:6px 12px;border-radius:20px;opacity:0;
  transform:scale(0.85);transition:all 0.25s cubic-bezier(.34,1.56,.64,1);
}
#feedback.show{opacity:1;transform:scale(1);}
#feedback.fb-c{background:var(--correct-bg);color:var(--correct);border:1px solid var(--correct-border);}
#feedback.fb-w{background:var(--wrong-bg);color:var(--wrong);border:1px solid var(--wrong-border);}

/* ── YOUTUBE CORNER BOX ── */
#yt-corner{
  position:fixed;
  bottom:28px;right:28px;
  width:300px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  box-shadow:0 8px 32px rgba(0,0,0,0.1);
  overflow:hidden;
  z-index:200;
  display:none;
  animation:popUp 0.28s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popUp{from{opacity:0;transform:translateY(12px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}
#yt-corner.visible{display:block;}
.yt-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;border-bottom:1px solid var(--border);
}
.yt-label{font-family:'LemonMilk',sans-serif;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text2);display:flex;align-items:center;gap:6px;}
.yt-label svg{color:var(--yt);}
#yt-close{background:none;border:none;cursor:pointer;color:var(--text3);line-height:1;padding:2px;transition:color 0.15s;}
#yt-close:hover{color:var(--text);}
.yt-body{padding:14px;}
.yt-hint{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.5;}
.yt-input-row{display:flex;gap:6px;}
#yt-input{
  flex:1;border:1px solid var(--border);border-radius:8px;
  padding:8px 11px;font-size:12.5px;font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--text);outline:none;
  transition:border-color 0.15s;
}
#yt-input:focus{border-color:var(--border2);}
#yt-go{
  background:var(--yt);color:#fff;border:none;border-radius:8px;
  padding:8px 12px;cursor:pointer;font-family:'LemonMilk',sans-serif;font-size:9px;
  letter-spacing:0.1em;text-transform:uppercase;transition:opacity 0.15s;white-space:nowrap;
}
#yt-go:hover{opacity:0.85;}
#yt-embed{margin-top:12px;border-radius:8px;overflow:hidden;display:none;}
#yt-embed iframe{width:100%;height:158px;border:none;display:block;}

/* ── QUESTION HELP TRIGGER ── */
#yt-trigger{
  position:fixed;bottom:28px;right:28px;
  width:44px;height:44px;border-radius:50%;
  background:var(--yt);color:#fff;
  border:none;cursor:pointer;
  display:none;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(255,45,45,0.35);
  transition:transform 0.2s, box-shadow 0.2s;
  z-index:199;
}
#yt-trigger.visible{display:flex;}
#yt-trigger:hover{transform:scale(1.08);box-shadow:0 6px 22px rgba(255,45,45,0.45);}

/* ── TRANSITIONS ── */
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.screen.active{animation:fadeSlideIn 0.3s ease forwards;}
#q-card{animation:fadeSlideIn 0.25s ease forwards;}

/* ── SCORE SUMMARY IN Q SCREEN ── */
.score-strip{
  display:flex;align-items:center;gap:16px;
  margin-bottom:20px;padding-bottom:20px;
  border-bottom:1px solid var(--border);
}
.score-chip{font-family:'LemonMilk',sans-serif;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;
  padding:4px 12px;border-radius:20px;border:1px solid var(--border);color:var(--text2);}
.score-chip span{color:var(--text);font-weight:700;}

/* done state on topic cards */
.topic-card.all-done{border-color:var(--correct-border);}
.topic-card.all-done .tc-arrow{color:var(--correct);}

/* divider */
.divider{width:100%;height:1px;background:var(--border);margin:32px 0;}

/* ── INLINE QUESTION VIDEO BOX ── */
.q-yt-box{margin-bottom:20px;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--surface);}
.q-yt-label{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--tag-bg);font-family:'LemonMilk',sans-serif;font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--text2);border-bottom:1px solid var(--border);}
.q-yt-label svg{color:var(--yt);}
.q-yt-ts{margin-left:auto;font-family:'LemonMilk',sans-serif;font-size:8px;letter-spacing:0.1em;color:var(--yt);background:rgba(255,45,45,0.08);border:1px solid rgba(255,45,45,0.2);border-radius:20px;padding:2px 8px;}
.q-yt-frame{background:#000;}
.q-yt-frame iframe{width:100%;height:175px;border:none;display:block;}
</style>
</head>
<body>
<div id="shell">

  <!-- TOP NAV -->
  <div id="topnav">
    <div class="brand">Physics <span>·</span> DPP-01</div>
    <button id="back-btn" onclick="goHome()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      All Topics
    </button>
  </div>

  <!-- HOME SCREEN -->
  <div id="home-screen" class="screen active">
    <div id="home-heading">
      <h1>Current Density,<br>Drift Velocity &amp; Relaxation Time</h1>
    </div>
    <p id="home-sub">Select a topic to begin practicing — 5 questions each.</p>
    <div class="topic-grid" id="topic-grid"></div>
  </div>

  <!-- QUESTION SCREEN -->
  <div id="q-screen" class="screen">
    <div id="qscreen-header">
      <div class="qs-topic" id="qs-topic-label"></div>
      <div class="qs-title" id="qs-title"></div>
    </div>

    <div class="score-strip">
      <div class="score-chip">Score <span id="sc-score">0</span> / <span id="sc-total">5</span></div>
      <div class="score-chip">Attempted <span id="sc-att">0</span></div>
    </div>

    <!-- Q pill selector -->
    <div class="q-selector" id="q-selector"></div>

    <!-- Active question -->
    <div id="q-card">
      <div class="q-label" id="q-label">Question 1 of 5</div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options"></div>
      <div id="sol-wrap"><div id="sol-box"></div></div>
      <div class="act-row">
        <div style="display:flex;align-items:center;gap:10px;">
          <div id="feedback"></div>
          <button id="show-ans-btn" onclick="showAnswer()">Show Answer</button>
        </div>
        <div class="nav-btns">
          <button id="prev-btn" onclick="moveQ(-1)">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
            Prev
          </button>
          <button id="next-btn" onclick="moveQ(1)">
            Next
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/><polyline points="12 5 19 12 12 19"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

</div><!-- /shell -->

<!-- YT TRIGGER FAB -->
<button id="yt-trigger" title="Watch solution video">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-2.75 12.64 12.64 0 0 0-8.07 0A4.83 4.83 0 0 1 4.41 6.69C3.14 9.14 3 12 3 12s.14 2.86 1.41 5.31a4.83 4.83 0 0 1 3.77 2.75 12.64 12.64 0 0 0 8.07 0 4.83 4.83 0 0 1 3.77-2.75C20.86 14.86 21 12 21 12s-.14-2.86-1.41-5.31zM10 15V9l5 3-5 3z"/></svg>
</button>

<!-- YT CORNER BOX -->
<div id="yt-corner">
  <div class="yt-header">
    <div class="yt-label">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-2.75 12.64 12.64 0 0 0-8.07 0A4.83 4.83 0 0 1 4.41 6.69C3.14 9.14 3 12 3 12s.14 2.86 1.41 5.31a4.83 4.83 0 0 1 3.77 2.75 12.64 12.64 0 0 0 8.07 0 4.83 4.83 0 0 1 3.77-2.75C20.86 14.86 21 12 21 12s-.14-2.86-1.41-5.31zM10 15V9l5 3-5 3z"/></svg>
      Solution Video
    </div>
    <button id="yt-close" onclick="closeYT()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="yt-body">
    <p class="yt-hint">Paste a YouTube link — timestamps supported (e.g. youtu.be/ID?t=125):</p>
    <div class="yt-input-row">
      <input type="text" id="yt-input" placeholder="https://youtube.com/watch?v=..." />
      <button id="yt-go" onclick="loadYT()">Load</button>
    </div>
    <div id="yt-embed"></div>
  </div>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const TOPICS = [
  {
    name:"Alpha Particle Current",
    questions:[
      {q:"5,000 alpha particles pass per minute through a tube. What is the electric current?",opts:["2.67 × 10⁻¹⁷ A","3.2 × 10⁻¹⁶ A","1.6 × 10⁻¹⁷ A","5.0 × 10⁻¹⁷ A"],ans:0,sol:"Each alpha carries charge 2e = 3.2×10⁻¹⁹ C. Rate = 5000/60 ≈ 83.3 particles/s. I = 83.3 × 3.2×10⁻¹⁹ ≈ 2.67×10⁻¹⁷ A.",yt:""},
      {q:"20,000 alpha particles pass per second through a tube. What is the resulting current?",opts:["6.4 × 10⁻¹⁵ A","3.2 × 10⁻¹⁵ A","1.28 × 10⁻¹⁴ A","6.4 × 10⁻¹⁴ A"],ans:0,sol:"I = 20000 × 3.2×10⁻¹⁹ = 6.4×10⁻¹⁵ A.",yt:""},
      {q:"A beam of 10⁸ alpha particles per second hits a target. The beam current is:",opts:["3.2 × 10⁻¹¹ A","1.6 × 10⁻¹¹ A","6.4 × 10⁻¹¹ A","3.2 × 10⁻¹⁰ A"],ans:0,sol:"I = 10⁸ × 2 × 1.6×10⁻¹⁹ = 3.2×10⁻¹¹ A.",yt:""},
      {q:"15,000 protons (charge +e) pass per minute through a tube. Current is:",opts:["4 × 10⁻¹⁷ A","8 × 10⁻¹⁷ A","2 × 10⁻¹⁷ A","4 × 10⁻¹⁶ A"],ans:0,sol:"I = (15000/60) × 1.6×10⁻¹⁹ = 250 × 1.6×10⁻¹⁹ = 4×10⁻¹⁷ A.",yt:""},
      {q:"3,000 alpha particles pass per minute. The current is:",opts:["1.6 × 10⁻¹⁷ A","3.2 × 10⁻¹⁷ A","0.8 × 10⁻¹⁷ A","4.8 × 10⁻¹⁷ A"],ans:0,sol:"I = (3000/60) × 3.2×10⁻¹⁹ = 50 × 3.2×10⁻¹⁹ = 1.6×10⁻¹⁷ A.",yt:""}
    ]
  },
  {
    name:"Electron Flow & Current",
    questions:[
      {q:"10⁸ electrons per second flow through a cross-section of 10⁻⁴ m². The current is:",opts:["1.6 × 10⁻¹¹ A","1.6 × 10⁻⁷ A","1.6 × 10⁻¹³ A","1.6 × 10⁻⁹ A"],ans:0,sol:"I = n × e = 10⁸ × 1.6×10⁻¹⁹ = 1.6×10⁻¹¹ A. Area does not affect current.",yt:""},
      {q:"10¹² electrons per second flow through a wire. The current is:",opts:["1.6 × 10⁻⁷ A","1.6 × 10⁻¹⁰ A","1.6 × 10⁻¹² A","6.25 × 10¹⁸ A"],ans:0,sol:"I = 10¹² × 1.6×10⁻¹⁹ = 1.6×10⁻⁷ A.",yt:""},
      {q:"A current of 2 A flows. How many electrons pass per second?",opts:["1.25 × 10¹⁹","2.5 × 10¹⁹","6.25 × 10¹⁸","1.25 × 10¹⁸"],ans:0,sol:"n = I/e = 2 / 1.6×10⁻¹⁹ = 1.25×10¹⁹ electrons/s.",yt:""},
      {q:"5 × 10¹⁰ electrons per second flow through an area 10⁻³ m². Current is:",opts:["8 × 10⁻⁹ A","8 × 10⁻⁷ A","8 × 10⁻¹¹ A","5 × 10⁻⁹ A"],ans:0,sol:"I = 5×10¹⁰ × 1.6×10⁻¹⁹ = 8×10⁻⁹ A.",yt:""},
      {q:"A current of 0.5 A flows. How much charge passes through in 2 minutes?",opts:["60 C","30 C","120 C","15 C"],ans:0,sol:"Q = I × t = 0.5 × 120 = 60 C.",yt:""}
    ]
  },
  {
    name:"Charge vs Time (Integration)",

// ── SHUFFLE HELPER ───────────────────────────────────────────────────────────
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// Build shuffled topic list and randomize answer positions per question
const TOPICS_SHUFFLED = TOPICS.map((t,ti)=>({
  ...t,
  topicIdx: ti,
  questions: t.questions.map(raw=>{
    const correctText = raw.opts[raw.ans];
    const sol = raw.sol;
    const indexed = raw.opts.map((o,i)=>({text:o, isCorrect: i===raw.ans}));
    shuffle(indexed);
    return {
      q: raw.q,
      opts: indexed.map(o=>o.text),
      ans: indexed.findIndex(o=>o.isCorrect),
      sol,
      yt: raw.yt||''
    };
  })
}));

// ── BUILD HOME ────────────────────────────────────────────────────────────────
function buildHome(){
  topicGrid.innerHTML='';
  TOPICS_SHUFFLED.forEach((topic,ti)=>{
    const ans = answers[ti];
    const done = ans.filter(a=>a!==null&&a.correct).length;
    const att  = ans.filter(a=>a!==null).length;
    const card = document.createElement('button');
    card.className='topic-card'+(att===5&&done===5?' all-done':'');
    const dots = Array(5).fill(0).map((_,i)=>{
      const d=answers[ti][i];
      return `<span class="tc-dot${d===null?'':d.correct?' done':''}"></span>`;
    }).join('');
    card.innerHTML=`
      <div class="tc-num">Topic ${String(ti+1).padStart(2,'0')}</div>
      <div class="tc-name">${topic.name}</div>
      <div class="tc-bar">
        <div class="tc-dots">${dots}</div>
        <span class="tc-count">${att}/5 attempted</span>
      </div>
      <svg class="tc-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    `;
    card.onclick=()=>openTopic(ti);
    topicGrid.appendChild(card);
  });
}

// ── OPEN TOPIC ────────────────────────────────────────────────────────────────
function openTopic(ti){
  curTopic = TOPICS_SHUFFLED[ti];
  curQ = 0;
  homeScreen.classList.remove('active');
  qScreen.classList.add('active');
  backBtn.style.display='flex';
  // Find first unanswered if any
  const firstUnanswered = answers[ti].findIndex(a=>a===null);
  if(firstUnanswered!==-1) curQ=firstUnanswered;
  renderQScreen();
}

function goHome(){
  qScreen.classList.remove('active');
  homeScreen.classList.add('active');
  backBtn.style.display='none';
  hideYT();
  buildHome();
}

// ── RENDER Q SCREEN ────────────────────────────────────────────────────────────
function renderQScreen(){
  const ti = TOPICS_SHUFFLED.indexOf(curTopic);
  qsTopicLbl.textContent = `Topic ${String(ti+1).padStart(2,'0')}`;
  qsTitle.textContent = curTopic.name;

  // Score strip
  const topicAns = answers[ti];
  const sc = topicAns.filter(a=>a&&a.correct).length;
  const att = topicAns.filter(a=>a!==null).length;
  scScore.textContent=sc; scTotal.textContent=5; scAtt.textContent=att;

  // Pill selector
  qSelector.innerHTML='';
  curTopic.questions.forEach((_,i)=>{
    const a=answers[ti][i];
    const pill=document.createElement('button');
    pill.className='q-pill'+(i===curQ?' active':'')+(a?a.correct?' answered-c':' answered-w':'');
    pill.textContent=i+1;
    pill.onclick=()=>{curQ=i;renderQScreen();};
    qSelector.appendChild(pill);
  });

  renderQuestion();
  updateYTVisibility();
}

function renderQuestion(){
  const ti = TOPICS_SHUFFLED.indexOf(curTopic);
  const q  = curTopic.questions[curQ];
  const a  = answers[ti][curQ];

  qLabel.textContent = `Question ${curQ+1} of 5`;
  qText.textContent  = q.q;
  solWrap.classList.remove('open');
  solBox.innerHTML='';
  feedbackEl.className='';
  feedbackEl.textContent='';

  // Reset card animation
  const card = document.getElementById('q-card');
  card.style.animation='none'; card.offsetHeight;
  card.style.animation='';

  // Options
  optionsDiv.innerHTML='';
  // ── Inline per-question YouTube video ──
  const _oldBox=document.getElementById('q-yt-box');
  if(_oldBox)_oldBox.remove();
  if(q.yt){
    const _ytd=extractYTData(q.yt);
    if(_ytd){
      const _box=document.createElement('div');
      _box.id='q-yt-box';
      _box.className='q-yt-box';
      const _embedUrl='https://www.youtube.com/embed/'+_ytd.id+'?rel=0'+(_ytd.start?'&start='+_ytd.start:'');
      const _tsLabel=_ytd.start?'<span class="q-yt-ts">from '+fmtTime(_ytd.start)+'</span>':'';
      _box.innerHTML=
        '<div class="q-yt-label">'+
        '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-2.75 12.64 12.64 0 0 0-8.07 0A4.83 4.83 0 0 1 4.41 6.69C3.14 9.14 3 12 3 12s.14 2.86 1.41 5.31a4.83 4.83 0 0 1 3.77 2.75 12.64 12.64 0 0 0 8.07 0 4.83 4.83 0 0 1 3.77-2.75C20.86 14.86 21 12 21 12s-.14-2.86-1.41-5.31zM10 15V9l5 3-5 3z"/></svg>'+
        'Solution Video'+_tsLabel+'</div>'+
        '<div class="q-yt-frame"><iframe src="'+_embedUrl+'" allowfullscreen loading="lazy"></iframe></div>';
      optionsDiv.insertAdjacentElement('beforebegin',_box);
    }
  }

  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='opt'+(a?' locked':'');
    btn.innerHTML=`<span class="opt-letter">${['A','B','C','D'][i]}</span>${opt}`;

    if(a!==null){
      if(i===q.ans) btn.classList.add('is-correct');
      else if(i===a.chosen && !a.correct) btn.classList.add('is-wrong');
      else btn.classList.add('reveal-correct');
    } else {
      btn.onclick=()=>choose(i);
    }
    optionsDiv.appendChild(btn);
  });

  // Show solution if already answered
  if(a!==null){
    solBox.innerHTML=`<strong>Solution —</strong> ${q.sol}`;
    solWrap.classList.add('open');
    showFeedback(a.correct);
    showAnsBtn.style.display='none';
  } else {
    showAnsBtn.style.display='inline-block';
  }

  prevBtn.disabled = curQ===0;
  nextBtn.disabled = false;
  nextBtn.textContent = curQ===4 ? 'Done' : 'Next ›';
  if(curQ===4){
    nextBtn.innerHTML=`Done <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;
  } else {
    nextBtn.innerHTML=`Next <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/><polyline points="12 5 19 12 12 19"/></svg>`;
  }

  updateYTVisibility();
}

function choose(chosen){
  const ti = TOPICS_SHUFFLED.indexOf(curTopic);
  const q  = curTopic.questions[curQ];
  const correct = chosen===q.ans;
  answers[ti][curQ]={chosen,correct};

  const opts = optionsDiv.querySelectorAll('.opt');
  opts.forEach((btn,i)=>{
    btn.classList.add('locked');
    btn.onclick=null;
    if(i===q.ans) btn.classList.add('is-correct');
    else if(i===chosen && !correct) btn.classList.add('is-wrong');
    else btn.classList.add('reveal-correct');
  });

  solBox.innerHTML=`<strong>Solution —</strong> ${q.sol}`;
  solWrap.classList.add('open');
  showFeedback(correct);
  showAnsBtn.style.display='none';

  // Update pill
  const pills=qSelector.querySelectorAll('.q-pill');
  pills[curQ].classList.remove('active');
  pills[curQ].classList.add(correct?'answered-c':'answered-w');
  pills[curQ].classList.add('active');

  // Update score strip
  const topicAns=answers[ti];
  scScore.textContent=topicAns.filter(a=>a&&a.correct).length;
  scAtt.textContent=topicAns.filter(a=>a!==null).length;
}

function showFeedback(correct){
  feedbackEl.className='';
  feedbackEl.offsetHeight;
  feedbackEl.textContent=correct?'Correct ✓':'Incorrect ✗';
  feedbackEl.className=(correct?'fb-c':'fb-w')+' show';
}

function showAnswer(){
  const ti = TOPICS_SHUFFLED.indexOf(curTopic);
  const q  = curTopic.questions[curQ];
  answers[ti][curQ]={chosen:-1,correct:false};
  const opts=optionsDiv.querySelectorAll('.opt');
  opts.forEach((btn,i)=>{
    btn.classList.add('locked');btn.onclick=null;
    if(i===q.ans) btn.classList.add('is-correct');
    else btn.classList.add('reveal-correct');
  });
  solBox.innerHTML=`<strong>Solution —</strong> ${q.sol}`;
  solWrap.classList.add('open');
  feedbackEl.className='fb-w show';
  feedbackEl.textContent='Answer shown';
  showAnsBtn.style.display='none';

  const pills=qSelector.querySelectorAll('.q-pill');
  pills[curQ].classList.add('answered-w');
  scAtt.textContent=answers[ti].filter(a=>a!==null).length;
}

function moveQ(dir){
  const newQ=curQ+dir;
  if(newQ<0||newQ>4){
    if(newQ>4) goHome();
    return;
  }
  curQ=newQ;
  renderQScreen();
}

// Parse YT timestamp string like "125", "2m5s", "1h2m3s" → seconds
function parseYTTime(s){
  if(!s)return 0;
  if(/^\d+$/.test(s))return parseInt(s);
  let t=0;
  const h=s.match(/(\d+)h/); if(h)t+=parseInt(h[1])*3600;
  const m=s.match(/(\d+)m/); if(m)t+=parseInt(m[1])*60;
  const sc=s.match(/(\d+)s/); if(sc)t+=parseInt(sc[1]);
  return t;
}
// Extract {id, start} from any YouTube URL or bare video ID
function extractYTData(url){
  if(!url)return null;
  let id='',start=0;
  const idM=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
  if(idM)id=idM[1];
  else{const bM=url.match(/^([a-zA-Z0-9_-]{11})$/);if(bM)id=bM[1];}
  if(!id)return null;
  const tM=url.match(/[?&]t=([^&\s]+)/);
  if(tM)start=parseYTTime(tM[1]);
  return{id,start};
}
// Format seconds as mm:ss or h:mm:ss
function fmtTime(s){
  if(!s)return'';
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(h)return h+':'+(m<10?'0':'')+m+':'+(sec<10?'0':'')+sec;
  return m+':'+(sec<10?'0':'')+sec;
}

// ── YOUTUBE ───────────────────────────────────────────────────────────────────
// Show only for topics 1-2 (indices 0 and 1)
function updateYTVisibility(){
  if(qScreen.classList.contains('active')){
    ytTrigger.classList.add('visible');
  } else {
    ytTrigger.classList.remove('visible');
    hideYT();
  }
}

ytTrigger.onclick=()=>{
  ytCorner.classList.add('visible');
  ytTrigger.classList.remove('visible');
};

function closeYT(){
  ytCorner.classList.remove('visible');
  if(qScreen.classList.contains('active')){
    ytTrigger.classList.add('visible');
  }
  ytEmbed.style.display='none';
  ytEmbed.innerHTML='';
  ytInput.value='';
}

function hideYT(){
  ytCorner.classList.remove('visible');
  ytTrigger.classList.remove('visible');
  ytEmbed.style.display='none';
  ytEmbed.innerHTML='';
  ytInput.value='';
}

function loadYT(){
  const val=ytInput.value.trim();
  if(!val) return;
  const ytd=extractYTData(val);
  if(!ytd){
    ytEmbed.style.display='block';
    ytEmbed.innerHTML=`<p style="font-size:12px;color:var(--wrong);padding:6px 0;">Couldn't find a valid YouTube URL.</p>`;
    return;
  }
  const embedUrl='https://www.youtube.com/embed/'+ytd.id+'?autoplay=0&rel=0'+(ytd.start?'&start='+ytd.start:'');
  ytEmbed.style.display='block';
  ytEmbed.innerHTML=`<iframe src="${embedUrl}" allowfullscreen></iframe>`;
}

// also allow Enter key in yt input
ytInput.addEventListener('keydown',e=>{if(e.key==='Enter')loadYT();});

// ── INIT ─────────────────────────────────────────────────────────────────────
buildHome();
</script>
