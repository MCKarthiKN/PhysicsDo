<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculus Integrations - Fly & Merge</title>
    <!-- Import Lemon Milk Font -->
    <link href="https://fonts.cdnfonts.com/css/lemon-milk" rel="stylesheet">
    <style>
        :root {
            --accent: #ffd700;
            --accent-hover: #ffea00;
            --bg-color: #0f1015;
            --panel-bg: rgba(28, 30, 38, 0.85);
            --text-color: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'LEMON MILK', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            letter-spacing: 1px;
            -webkit-tap-highlight-color: transparent;
        }

        #bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }

        /* --- Transitions Framework --- */
        .fade-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            transition: opacity 0.4s ease-in-out, visibility 0.4s ease-in-out;
            opacity: 0; visibility: hidden; z-index: 10;
        }
        .fade-layer.active {
            opacity: 1; visibility: visible;
        }

        /* --- Start Screen --- */
        #start-screen {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1a1c23 0%, var(--bg-color) 100%);
            z-index: 20;
        }

        h1 { margin-bottom: 40px; font-weight: normal; text-align: center; padding: 0 20px; font-size: 2rem;}

        .cards-container {
            display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; padding: 20px;
        }

        .card {
            width: 200px; height: 260px;
            background: #1c1e26; border-radius: 16px; cursor: pointer;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6); border: 2px solid transparent;
        }

        .card:hover {
            transform: translateY(-15px) scale(1.05);
            border-color: var(--accent); box-shadow: 0 15px 40px rgba(255, 215, 0, 0.25);
        }

        .card h2 { font-size: 1.1rem; }

        .diagram { width: 100px; height: 100px; margin-bottom: 20px; position: relative; }
        .diag-rod { background: linear-gradient(90deg, #2194ce, #166d99); height: 25px; width: 110px; border-radius: 12px; margin-top: 35px; }
        .diag-disc { background: repeating-radial-gradient(circle, #2194ce, #2194ce 10px, #1c1e26 10px, #1c1e26 12px); border-radius: 50%; border: 2px solid #2194ce; width: 90px; height: 90px;}
        .diag-sphere { background: radial-gradient(circle at 30% 30%, #5ac2fc, #166d99); border-radius: 50%; width: 90px; height: 90px; box-shadow: inset -10px -10px 20px rgba(0,0,0,0.5);}

        /* --- Main UI Elements --- */
        #ui-container { z-index: 5; pointer-events: none; }
        .interactive { pointer-events: auto; }

        #header {
            position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px;
        }

        button.btn-back {
            padding: 12px 24px; background: #2194ce; color: white; border: none; border-radius: 8px;
            cursor: pointer; font-size: 0.9rem; font-family: 'LEMON MILK', sans-serif; transition: background 0.3s;
        }
        button.btn-back:hover { background: #166d99; }

        #formula {
            background: rgba(0,0,0,0.6); padding: 12px; border-radius: 8px; backdrop-filter: blur(5px);
            font-size: 1rem; color: var(--accent); text-transform: none; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,215,0,0.4);
        }

        /* --- Responsive Unified Control Panel --- */
        #controls-panel {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 600px;
            background: var(--panel-bg); backdrop-filter: blur(10px);
            border-radius: 16px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.7); display: flex; flex-direction: column;
            overflow: hidden; transition: height 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .panel-header {
            display: flex; justify-content: space-between; align-items: center; padding: 15px 25px;
            cursor: pointer; background: rgba(0,0,0,0.2); font-size: 0.9rem;
        }
        
        .panel-header .chevron { transition: transform 0.3s ease; }
        .panel-header.collapsed .chevron { transform: rotate(-180deg); }

        .panel-content {
            padding: 0 25px 25px 25px; display: flex; flex-direction: column; gap: 15px;
            transition: opacity 0.3s;
        }
        
        .panel-content.hidden { display: none; }

        .thickness-toggles { display: flex; justify-content: center; gap: 20px; margin-top: 15px;}
        
        .radio-container {
            display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.8rem;
        }

        .slider-wrapper { text-align: center; width: 100%; margin-top: 10px; }
        .slider-labels { display: flex; justify-content: space-between; font-size: 0.7rem; color: #888; margin-top: 5px; }
        
        #slider-val { color: var(--accent); font-size: 1.2rem; display: block; margin-bottom: 5px; text-shadow: 0 0 8px var(--accent); }

        .slider {
            -webkit-appearance: none; width: 100%; height: 10px; border-radius: 5px;
            background: #444; outline: none; margin-top: 5px; cursor: pointer;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 24px; height: 24px;
            border-radius: 50%; background: var(--accent);
            box-shadow: 0 0 15px var(--accent); border: 2px solid #fff;
        }

        /* Responsive Mobile Styles */
        @media (max-width: 768px) {
            h1 { font-size: 1.5rem; }
            #controls-panel { width: 100%; bottom: 0; border-radius: 20px 20px 0 0; }
            .cards-container { flex-direction: column; }
            .card { width: 250px; height: 200px; }
            .card .diagram { width: 70px; height: 70px; margin-bottom: 10px;}
        }
    </style>
</head>
<body>

    <!-- START SCREEN -->
    <div id="start-screen" class="fade-layer active">
        <h1>Select a Concept to Integrate</h1>
        <div class="cards-container">
            <div class="card" onclick="selectShape('rod')">
                <div class="diagram diag-rod"></div><h2>Rod</h2>
            </div>
            <div class="card" onclick="selectShape('disc')">
                <div class="diagram diag-disc"></div><h2>Disc Area</h2>
            </div>
            <div class="card" onclick="selectShape('sphere')">
                <div class="diagram diag-sphere"></div><h2>Solid Shell</h2>
            </div>
        </div>
    </div>

    <!-- MAIN UI APP -->
    <div id="ui-container" class="fade-layer">
        <div id="header" class="interactive">
            <button class="btn-back" onclick="goBack()">&#8592; MENU</button>
            <div id="formula"></div>
        </div>

        <!-- COLLAPSIBLE MOBILE-FRIENDLY DASHBOARD -->
        <div id="controls-panel" class="interactive">
            <div class="panel-header" onclick="togglePanel()">
                <span>Integration Controls</span>
                <span class="chevron" id="chevron">&#9660;</span>
            </div>
            
            <div class="panel-content" id="panel-body">
                <div class="thickness-toggles">
                    <label class="radio-container">
                        <input type="radio" name="size" value="observable" checked onchange="handleSizeChange()"> 
                        Observable Elements
                    </label>
                    <label class="radio-container">
                        <input type="radio" name="size" value="infinitesimal" onchange="handleSizeChange()"> 
                        Infinitesimal dx/dr
                    </label>
                </div>
                
                <div class="slider-wrapper">
                    <span id="slider-val">0%</span>
                    <input type="range" min="0" max="100" value="0" class="slider" id="integrateSlider" oninput="handleSliderChange()">
                    <div class="slider-labels">
                        <span>Empty Space</span>
                        <span>Full Solid</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- THREE.JS CANVAS -->
    <canvas id="bg"></canvas>

    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // --- App Variables ---
        let currentShape = null; 
        let viewSize = 'observable'; 
        let steps = 20; 

        // Target Integration slider variable (0 to 100)
        let targetIntegrationPerc = 0; 
        // Smooth continuous lerp for breathtaking 'fly-in' mechanics
        let currentIntegrationPerc = 0; 

        // --- Three.js Setup ---
        let scene, camera, renderer, controls;
        let activeGroup = new THREE.Group();
        let meshes =[]; 

        const materialNormal = new THREE.MeshStandardMaterial({ 
            color: 0x1ca4f2, transparent: true, opacity: 0.90, side: THREE.DoubleSide
        });
        
        const materialGlow = new THREE.MeshStandardMaterial({ 
            color: 0xffea00, emissive: 0xffb700, emissiveIntensity: 1.2, transparent: true, opacity: 1, side: THREE.DoubleSide
        });

        init();
        animate();

        function init() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
            renderer = new THREE.WebGLRenderer({ canvas: document.querySelector('#bg'), antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.position.set(15, 25, 10);
            scene.add(dirLight);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            scene.add(activeGroup);
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // --- Core UI & Anti-Lag Logic ---

        function selectShape(shapeType) {
            // Anti-Lag strategy: Start Fade OUT
            document.getElementById('start-screen').classList.remove('active');
            
            currentShape = shapeType;
            viewSize = document.querySelector('input[name="size"]:checked').value;
            
            // Allow CSS UI fade transition time, then construct heavy math meshes silently to avoid stutter!
            setTimeout(() => {
                resetViewParams();
                buildShape();
                updateFormulaUI();
                
                // Fade UI controls IN
                document.getElementById('ui-container').classList.add('active');
            }, 300);
        }

        function goBack() {
            document.getElementById('ui-container').classList.remove('active');
            setTimeout(() => {
                document.getElementById('start-screen').classList.add('active');
                clearGroup();
                currentShape = null;
            }, 300);
        }

        function togglePanel() {
            const body = document.getElementById('panel-body');
            const header = document.querySelector('.panel-header');
            if(body.classList.contains('hidden')) {
                body.classList.remove('hidden');
                header.classList.remove('collapsed');
            } else {
                body.classList.add('hidden');
                header.classList.add('collapsed');
            }
        }

        function handleSizeChange() {
            viewSize = document.querySelector('input[name="size"]:checked').value;
            buildShape(); // Instant rebuild meshes, preserving current slider progress dynamically
        }

        function resetViewParams() {
            const slider = document.getElementById('integrateSlider');
            slider.value = 0;
            targetIntegrationPerc = 0;
            currentIntegrationPerc = 0;
            document.getElementById('slider-val').innerText = '0%';
            
            controls.target.set(0,0,0);
            if(currentShape === 'rod') camera.position.set(0, 0, 22);
            if(currentShape === 'disc') camera.position.set(0, -5, 20);
            if(currentShape === 'sphere') camera.position.set(16, 8, 16);
        }

        function handleSliderChange() {
            const slider = document.getElementById('integrateSlider');
            targetIntegrationPerc = parseInt(slider.value); 
            document.getElementById('slider-val').innerText = targetIntegrationPerc + '%';
        }

        function updateFormulaUI() {
            const el = document.getElementById('formula');
            if(currentShape === 'rod') el.innerHTML = "&int; dx &rightarrow; Rod Length (L)";
            if(currentShape === 'disc') el.innerHTML = "&int; 2&pi;r &cdot; dr &rightarrow; Disc Area (A)";
            if(currentShape === 'sphere') el.innerHTML = "&int; 4&pi;r&sup2; &cdot; dr &rightarrow; Shell Vol (V)";
        }

        // --- Master "Fly & Merge" Calculus Engine Generators ---

        function clearGroup() {
            meshes.forEach(m => activeGroup.remove(m));
            meshes =[];
        }

        function buildShape() {
            clearGroup();
            
            // "Infinitesimal" bumps iteration drastically for "very small slices" physics
            steps = (viewSize === 'observable') ? 20 : 150; 
            
            if (currentShape === 'rod') buildRod(steps);
            if (currentShape === 'disc') buildDisc(steps);
            if (currentShape === 'sphere') buildSphere(steps);
        }

        // 1. ROD
        function buildRod(N) {
            const length = 15; const radius = 0.6; const dx = length / N;
            
            for (let i = 0; i < N; i++) {
                const geo = new THREE.CylinderGeometry(radius, radius, dx, 32);
                const mesh = new THREE.Mesh(geo, materialNormal);
                mesh.rotation.z = Math.PI / 2;
                
                // Final merged resting position
                mesh.userData.targetPos = new THREE.Vector3((-length / 2) + (i * dx) + (dx / 2), 0, 0);
                
                // Fly-in origin coordinates (Flies sequentially sideways and forwards down onto the X-Axis)
                mesh.userData.startPos = new THREE.Vector3(mesh.userData.targetPos.x, 15, 15);
                
                mesh.visible = false;
                meshes.push(mesh);
                activeGroup.add(mesh);
            }
        }

        // 2. DISC AREA
        function buildDisc(N) {
            const maxRadius = 8; const dr = maxRadius / N;
            
            for (let i = 0; i < N; i++) {
                const innerRad = i * dr;
                const outerRad = (i + 1) * dr;
                
                const geo = new THREE.RingGeometry(innerRad, outerRad, 64);
                const mesh = new THREE.Mesh(geo, materialNormal);
                
                mesh.userData.targetPos = new THREE.Vector3(0, 0, 0);
                // Flies straight down the Z-axis vector exactly into the facial viewer's perspective plane
                mesh.userData.startPos = new THREE.Vector3(0, 0, 20); 
                
                mesh.visible = false;
                meshes.push(mesh);
                activeGroup.add(mesh);
            }
        }

        // 3. SOLID SHELL (SPHERE)
        function buildSphere(N) {
            const maxRadius = 7.5; const dr = maxRadius / N;
            
            for (let i = 0; i < N; i++) {
                const r = (i + 1) * dr;
                
                // Rendered as "Cut-away/Pac-Man" Geometry natively solving outer-sphere occlusion visibility 
                // allowing internal growing layers full observable freedom
                const geo = new THREE.SphereGeometry(r, 48, 24, 0, Math.PI * 1.5, 0, Math.PI);
                
                const mesh = new THREE.Mesh(geo, materialNormal);
                
                mesh.userData.targetPos = new THREE.Vector3(0, 0, 0);
                // Sub-shells swoop horizontally and scale internally from outside bounds dynamically 
                mesh.userData.startPos = new THREE.Vector3(15, 8, -5); 

                mesh.visible = false;
                meshes.push(mesh);
                activeGroup.add(mesh);
            }
            
            // Reorient the spherical nested nest for optimum inner visual cut-away profile viewing
            activeGroup.rotation.y = -Math.PI / 4;
            activeGroup.rotation.x = 0.2;
        }


        // --- Beautiful Flight & Merging Animation Loop ---

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // 1. Math Smooth Dampening Controller for silky organic slider swoops
            let diff = targetIntegrationPerc - currentIntegrationPerc;
            if (Math.abs(diff) > 0.05) {
                currentIntegrationPerc += diff * 0.12; 
            } else {
                currentIntegrationPerc = targetIntegrationPerc; // hard snap tail bounds
            }

            // Maps physical 0-100% Slider directly unto iterative piece Index bounds dynamically
            let currentIndexMapping = (currentIntegrationPerc / 100) * steps;

            for (let i = 0; i < steps; i++) {
                // Ignore empty cache builds
                if(!meshes[i]) continue;
                
                let piece = meshes[i];
                // Calculates independent physics distance parameters per object sub-index relatively. 
                // Creating a 'waterfall/zipper' cascade flight path mechanics!
                let delta = currentIndexMapping - i; 

                if (delta <= 0) {
                    // Piece future step: completely hidden pending Slider reaching array bounds
                    piece.visible = false;
                    
                } else if (delta >= 1) {
                    // Piece successfully docked mathematically. Merge finalized 
                    piece.visible = true;
                    piece.position.copy(piece.userData.targetPos);
                    piece.scale.setScalar(1);

                    // Requirement: Continual Golden Integration Frontglow mapped only unto the current interacting boundary
                    // This creates a fiery ring outlining the EXACT differential equation surface tracking growth bounds
                    let activeTipIndex = Math.floor(currentIndexMapping) - 1;
                    if(i === activeTipIndex && targetIntegrationPerc < 100) {
                         piece.material = materialGlow;
                    } else {
                         piece.material = materialNormal;
                    }
                    
                } else {
                    // Flight transition frame sequence logic executing! `delta` oscillates strictly between 0 and 1
                    piece.visible = true;
                    
                    // Smooth Sine dampening scaling for gravity-based merging impacts
                    let easedCurve = Math.sin(delta * Math.PI / 2);
                    
                    // Dynamic spatial Vector transition merging physics! Flies from user 'Side bounds' to origin face.
                    piece.position.lerpVectors(piece.userData.startPos, piece.userData.targetPos, easedCurve);
                    
                    // Slightly scales expanding objects seamlessly from thin air creating volumetric buildup illusion
                    piece.scale.setScalar(0.2 + (0.8 * easedCurve));
                    
                    // Active glowing logic requirement natively applied directly unto mid-flight integrations
                    piece.material = materialGlow; 
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
